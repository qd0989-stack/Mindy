name: mindy
description: "Mindy - A voice-activated psychological wellness companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^14.2.7
  
  # Dependency Injection
  get_it: ^7.7.0
  
  # Local Storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  
  # Networking
  dio: ^5.7.0
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.18.0
  rxdart: ^0.28.0
  
  # Audio (for voice pipeline)
  audio_waveforms: ^1.1.0
  
  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
